    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/svg+xml" sizes="32x32" href="favicon32.svg">
    <link rel="shortcut icon" href="favicon.svg">
    <link rel="stylesheet" href="style/main.css">

</head>
<body class="app-body">

<header class="app-navbar">
  <div class="app-logo">FinTrack</div>
  <nav class="app-nav desktop-only">
    <a href="dashboard.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Dashboard</a>
    <a href="transactions.html" class="active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6l4-4 4 4"/><path d="M12 2v10"/><path d="M16 18l-4 4-4-4"/><path d="M12 22V12"/></svg> Transactions</a>
    <a href="budgets.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg> Budgets</a>
    <a href="goals.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg> Goals</a>
    <a href="recurring.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> Recurring</a>
    <a href="analytics.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> Analytics</a>
  </nav>
  <div class="app-user">
    <a href="profile.html" class="profile-nav-link">
      <span class="nav-avatar" id="navAvatar">?</span>
      <span class="user-name desktop-only">User</span>
    </a>
    <a href="settings.html" class="settings-link desktop-only" title="Settings" aria-label="Settings"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a>
    <button id="logoutBtn" class="btn-logout desktop-only"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</button>
  </div>
</header>

<main class="app-main">
    <div class="page-header">
        <div>
            <h2>Transactions</h2>
            <p>Manage your income and expenses</p>
        </div>
        <button id="addBtn" class="btn-primary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add</button>
    </div>

    <div class="txn-totals">
        <div class="txn-total-card expense">
            <span>Total Expenses</span>
            <strong id="tabTotalExpense">$0.00</strong>
        </div>
        <div class="txn-total-card income">
            <span>Total Income</span>
            <strong id="tabTotalIncome">$0.00</strong>
        </div>
    </div>

    <div class="filter-bar">
        <div class="tab-group">
            <button class="tab-btn active" data-tab="expense">Expenses</button>
            <button class="tab-btn" data-tab="income">Income</button>
        </div>
        <div class="filter-controls">
            <select id="categoryFilter">
                <option value="All">All Categories</option>
            </select>
            <input type="month" id="monthFilter">
        </div>
    </div>

    <div id="transactionList" class="txn-list">
        <p class="loading-text">Loading...</p>
    </div>
</main>

<!-- Mobile FAB for adding -->
<button class="mobile-add-fab" id="mobileAddBtn" aria-label="Add transaction"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>

<nav class="mobile-bottom-nav">
  <a href="dashboard.html" class="mobile-nav-item"><span class="mobile-nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span><span class="mobile-nav-label">Home</span></a>
  <a href="transactions.html" class="mobile-nav-item active"><span class="mobile-nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6l4-4 4 4"/><path d="M12 2v10"/><path d="M16 18l-4 4-4-4"/><path d="M12 22V12"/></svg></span><span class="mobile-nav-label">Txns</span></a>
  <a href="budgets.html" class="mobile-nav-item"><span class="mobile-nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></span><span class="mobile-nav-label">Budgets</span></a>
  <a href="analytics.html" class="mobile-nav-item"><span class="mobile-nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span><span class="mobile-nav-label">Analytics</span></a>
  <a href="profile.html" class="mobile-nav-item"><span class="mobile-nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span><span class="mobile-nav-label">Profile</span></a>
</nav>

<!-- ADD/EDIT MODAL -->
<div id="transactionModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="modalTitle">Add Expense</h3>
            <button id="closeModal" class="modal-close"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <form id="transactionForm">
            <div id="expenseFields">
                <input type="text" id="titleField" placeholder="Title (e.g. Lunch)" required>
                <select id="categoryField"></select>
            </div>
            <div id="incomeFields" style="display:none">
                <input type="text" id="sourceField" placeholder="Source (e.g. Salary)">
            </div>
            <input type="number" id="amountField" placeholder="Amount" min="0.01" step="0.01" required>
            <input type="date" id="dateField" required>
            <input type="text" id="noteField" placeholder="Note (optional)">
            <div class="modal-actions">
                <button type="button" id="cancelBtn" class="btn-secondary">Cancel</button>
                <button type="submit" class="btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>

<script src="js/icons.js"></script>
<script src="js/api.js"></script>
<script src="js/transactions.js"></script>
<script>
    // Wire mobile FAB to same add modal
    document.getElementById('mobileAddBtn')?.addEventListener('click', () => openAddModal());
</script>
</body>
</html>
