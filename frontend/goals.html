        <div><h2>Financial Goals</h2><p>Track progress toward what matters most</p></div>

    </div>

    <div id="emptyGoals" class="empty-state" style="display:none">
        <div class="empty-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div>

        <button class="btn-primary" onclick="document.getElementById('addGoalBtn').click()">+ Create Goal</button>
    </div>

<!-- Goal Modal -->
<div id="goalModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header"><h3>Create Goal</h3><button id="closeGoalModal" class="modal-close"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
        <form id="goalForm">
            <div style="display:flex;gap:10px">
                <input type="text" id="goalEmoji" placeholder="★" style="width:60px;text-align:center;font-size:22px">
                <input type="text" id="goalTitle" placeholder="Goal name (e.g. Vacation Fund)" required style="flex:1">
            </div>
            <input type="number" id="goalTarget" placeholder="Target amount" min="0.01" step="0.01" required>
            <input type="date" id="goalDate" placeholder="Target date (optional)">
            <input type="text" id="goalNote" placeholder="Note (optional)">
            <div class="modal-actions">
                <button type="button" id="cancelGoalBtn" class="btn-secondary">Cancel</button>
                <button type="submit" class="btn-primary">Create Goal</button>
            </div>
        </form>
    </div>
</div>
<!-- Add Funds Modal -->
<div id="fundsModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header"><h3>Add Funds</h3><button id="closeFundsModal" class="modal-close"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
        <form id="fundsForm">
            <p id="fundsGoalTitle" style="font-weight:600;margin-bottom:4px"></p>
            <p id="fundsRemaining" style="color:var(--text-light);font-size:13px;margin-bottom:12px"></p>
            <input type="number" id="fundsAmount" placeholder="Amount to add" min="0.01" step="0.01" required>
            <div class="modal-actions">
                <button type="button" id="cancelFundsBtn" class="btn-secondary">Cancel</button>
                <button type="submit" class="btn-primary">Add Funds</button>
            </div>
        </form>
    </div>
</div>
