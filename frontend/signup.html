<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#00d4a0">
<title>Sign Up — FinTrack</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/svg+xml" sizes="32x32" href="favicon32.svg">
    <link rel="shortcut icon" href="favicon.svg">
<link rel="stylesheet" href="style/main.css">
<script src="js/theme.js"></script>
</head>
<body>
<div class="auth-container">

  <div class="auth-left">
    <div class="auth-brand">FinTrack</div>
    <div class="auth-tagline">
      <h2>Take control of<br>every dollar<br>you earn.</h2>
      <p>Join thousands tracking smarter. Set up takes under 2 minutes.</p>
    </div>
    <div class="auth-stats">
      <div><span class="auth-stat-val">Free</span><span class="auth-stat-label">Forever</span></div>
      <div><span class="auth-stat-val">0</span><span class="auth-stat-label">Hidden fees</span></div>
      <div><span class="auth-stat-val">100%</span><span class="auth-stat-label">Your data</span></div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <h2 class="auth-card-title">Create account</h2>
      <p class="auth-card-sub">Free forever. No credit card needed.</p>
      <form id="signupForm">
        <input type="text" placeholder="Full name" required autocomplete="name">
        <input type="email" placeholder="Email address" required autocomplete="email">
        <input type="password" placeholder="Password (min 6 chars)" required autocomplete="new-password">
        <button type="submit">Create account</button>
      </form>
      <p class="auth-switch">Already have an account? <a href="login.html">Sign in <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></a></p>
    </div>
  </div>

</div>
<script src="js/icons.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
